<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firefly Marketing Group</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #0A0A0A;
      color: #B99B5F;
      margin: 0;
      padding: 0;
      text-align: center;
      overflow-x: hidden;
    }
    header {
      padding: 120px 20px 80px 20px; /* extra top padding for space above logo */
    }
    img {
      width: 220px;
      margin-bottom: 50px; /* extra space below logo */
    }
    h1 {
      font-size: 3.2em;
      margin-bottom: 20px;
      text-shadow: 1px 1px 3px #000;
    }
    .tagline {
      font-size: 1.5em;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeInUp 2s forwards;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px);}
      100% { opacity: 1; transform: translateY(0);}
    }
    .button {
      display: inline-block;
      margin: 15px 10px;
      padding: 15px 35px;
      background: #B99B5F;
      color: #0A0A0A;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: bold;
      transition: 0.3s;
    }
    .button:hover {
      background: #a88c50;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Firefly Logo">
    <h1>Welcome to the Firefly Marketing Group</h1>
    <div class="tagline">Helping Short Term Rental Owners Shine | Branding • Staging • Marketing • 24/7 Support</div>
    <a class="button" href="about.html">Learn More</a>
    <a class="button" href="contact.html">Contact Us</a>
  </header>
</body>
</html>
