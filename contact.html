<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Firefly Marketing</title>
  <style>
    body { font-family: Arial, sans-serif; text-align:center; background:#000; color:#D4AF37; margin:0; padding:0; }
    header { padding:60px 20px; }
    h1 { font-size:2.8em; margin:20px 0; }
    p { font-size:1.2em; margin:15px auto; max-width:600px; line-height:1.5em; }
    a.button { display:inline-block; margin:20px 10px; padding:12px 25px; background:#D4AF37; color:#000; text-decoration:none; border-radius:8px; font-size:1.1em; font-weight:bold; }
    a.button:hover { background:#b9962b; }
    form { max-width:500px; margin:30px auto; text-align:left; }
    input, textarea { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #D4AF37; background:#000; color:#D4AF37; font-size:1em; }
    input[type="submit"] { background:#D4AF37; color:#000; border:none; cursor:pointer; font-weight:bold; }
    input[type="submit"]:hover { background:#b9962b; }
    label { display:block; margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>
  <header>
    <h1>Contact Firefly Marketing</h1>
  </header>
  <p>Contact us today to learn how Firefly Marketing can help your home shine!</p>
  <p>Email: info@fireflydomain.com</p>
  <p>Phone: (615) 266-6787</p>

  <form action="mailto:anig@fireflymktggroup.com" method="post" enctype="text/plain">
    <label>Name:</label>
    <input type="text" name="name" required>
    <label>Email:</label>
    <input type="email" name="email" required>
    <label>Message:</label>
    <textarea name="message" rows="5" required></textarea>
    <input type="submit" value="Send Message">
  </form>

  <a class="button" href="index.html">Back to Home</a>
  <a class="button" href="about.html">About Us</a>
</body>
</html>
